server {
    listen 80;
    server_name your-server-ip;

    location / {
        root /var/www/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api {
        proxy_pass http://unix:/tmp/app.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}